                <h2 class="titulo_secundario">Entre em  contato</h2>

                <form action="processa.php" method="post" autocomplete="off">
                    <label for="nomepessoa">Nome:</label>
                    <input type="text" name="nomepessoa"
                    id="nomepessoa" minlength="3" maxlength="15" required placeholder="Informe seu Nome"><br></br>

                    <label for="email">Email:</label>
                    <input type="email" name="email" id="email" placeholder="Informe seu E-mail"><br></br>
                    
                    <label for="number">Ano de nascimento</label>
                    <input type="number" id="ano" name="ano" max="2026" min="1900" placeholder="Informe seu Ano de Nascimento"><br></br>
                    
                    <label for="telefone">Telefone</label>
                    <input type="tel" name="telefone" id="telefone" placeholder="Informe seu Teleone"><br></br>

                    <label for="github"> Informe seu Github</label>
                    <input type="url" name="github" id="github" placeholder="Informe seu Github"><br></br>


                    <label for="senha"> Informe sua senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Informe sua senha"><br></br>

                    <label for="arquivo"> Anexe seu arquivo</label>
                    <input type="file" id="arquivo" name="arquivo"><br></br>

                    
                    <label for="cor">Escolha uma cor</label>
                    <input type="color" id="cor" name="cor" placeholder="Escolha uma cor"><br></br>


                    <fieldset>

                        <legend>Campos de Tempo</legend>

                        <label for="data">Informe a data</label>
                        <input type="date" id="data" name="data" placeholder="Informe uma data"><br></br>

                        <label for="mes">Informe o mês</label>
                        <input type="month" id="mes" name="mes" placeholder="Informe um mes"><br></br>

                        <label for="semana">Informe a semana</label>
                        <input type="week" id="semana" name="semana" placeholder="Informe uma semana"><br></br>

                        <label for="hora">Informe a hora</label>
                        <input type="hour" id="hora" name="hora" placeholder="Informe uma hora"><br></br>

                        <label for="hora">Data e hora atual</label>
                        <input type="datetime-local" id="datahora" name="datahora" placeholder="Informe Data e hora atual"><br></br>

                    </fieldset>

                    <label for="pesquisa">Pesquisa</label>
                    <input type="search" id="pesquisa" name="pesquisa" placeholder="Pesquisa"><br></br>

                    <label for="descricao">Informe aqui o que você gosta nos filmes</label>
                    <textarea cols="30" rows="10" name="descricao" id="descricao"></textarea><br></br>

                    <fieldset>

                    <legend>Qual seu filme favorito?</legend>
                    <input type="radio" name="filme" value="filme 1" id="filme1"> <label for="filme1"> Filme 1</label>

                    <input checked type="radio" name="filme" value="filme 2" id="filme2"> <label for="filme2"> Filme 2</label>

                    <input type="radio" name="filme" value="filme 3" id="filme3"> <label for="filme3"> Filme 3</label>

                    </fieldset>

                    <select name="" id="">
                        <option value="filme1">Filme 1</option>
                        <option value="filme2"> Filme 2</option>
                        <option value="filme3"> Filme 3</option>
                    </select>

                    <button type="reset">Limpar</button>
                    <button type="submit">Enviar</button>

                </form>
</body>
</html>
